<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YÖRÜK | Digital Studio</title>
    <!-- Premium Google Fonts: Inter for clean structural text, Cormorant Garamond for luxury serif accents -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem 2rem;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle luxury entrance animation */
        .fade-in {
            animation: fadeIn ease 1.6s;
            -webkit-animation: fadeIn ease 1.6s;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        header {
            width: 100%;
        }

        .status-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-weight: 500;
        }

        main {
            max-width: 600px;
            margin-top: -4rem; /* Optical alignment */
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-style: italic;
            color: var(--text-muted);
            line-height: 1.4;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .footer-line {
            height: 1px;
            background-color: #e5e5e5;
            flex-grow: 1;
            margin: 0 1.5rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 2rem 1.5rem;
            }
            footer {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            .footer-line {
                display: none;
            }
        }
    </style>
</head>
<body class="fade-in">

    <header>
        <div class="status-badge">Studio — Autumn 2026</div>
    </header>

    <main>
        <h1>Yörük</h1>
        <p class="tagline">Curating high-end digital experiences, visual identities, and refined online architectures.</p>
        <!-- Change the email address below to yours when your business mail is live -->
        <a href="mailto:hello@helloyoruk.com" class="cta-button">Inquire &rarr;</a>
    </main>

    <footer>
        <div>&copy; 2026 YÖRÜK</div>
        <div class="footer-line"></div>
        <div>Available for global commissions</div>
    </footer>

</body>
</html>
